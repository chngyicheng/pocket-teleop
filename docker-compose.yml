services:
  teleop-server:
    build:
      context: .
      network: host
    ports:
      - "9091:9091"
    environment:
      - "TELEOP_TOKEN=${TELEOP_TOKEN:?Error: TELEOP_TOKEN must be set before starting the server}"
      - ROBOT_TYPE=${ROBOT_TYPE:-diff_drive}
    restart: unless-stopped

  webclient:
    build:
      context: ./web-client
      dockerfile: Dockerfile.webclient
      target: runtime
      network: host
    ports:
      - "8080:80"
    restart: unless-stopped

  webclient-test:
    profiles: ["test"]
    build:
      context: ./web-client
      dockerfile: Dockerfile.webclient
      target: base
      network: host
    environment:
      - TELEOP_SERVER_URL=ws://teleop-server:9091/teleop
      - "TELEOP_TOKEN=${TELEOP_TOKEN:?Error: TELEOP_TOKEN must be set}"
    depends_on:
      - teleop-server
    command: ["npm", "test"]
